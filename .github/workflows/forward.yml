name: A加z分數 前向測試
on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  run-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: 每日訊號報告
        run: python forward_combo.py

      - name: 真模擬金帳戶 + 手機儀表板
        run: python paper_account.py

      - name: 存回 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for f in combo_forward_log.csv paper_log.csv paper_state.json index.html; do
            git add "$f" 2>/dev/null || true
          done
          git diff --staged --quiet || git commit -m "前向+模擬金 $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash || true
          git push
